<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PoopBuddy Store Assets</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; min-height: 100%; background: #f5faf7; font-family: "Malgun Gothic", "Noto Sans KR", "Segoe UI", Arial, sans-serif; color: #123529; }
    body { overflow: hidden; }
    .board { position: relative; overflow: hidden; background: linear-gradient(135deg, #ffffff 0%, #eef7f2 62%, #dcefe6 100%); }
    .brand { display: flex; align-items: center; gap: 18px; font-weight: 900; letter-spacing: 0; }
    .mark { width: 68px; height: 68px; border-radius: 20px; background: #2f7d63; display: grid; place-items: center; color: #fff; font-weight: 900; font-size: 24px; box-shadow: 0 18px 40px rgba(47,125,99,.18); }
    .kicker { display: inline-flex; align-items: center; height: 44px; padding: 0 22px; border-radius: 999px; background: #e6f3ed; color: #2f7d63; font-weight: 900; font-size: 20px; }
    .headline { margin: 0; font-weight: 900; line-height: 1.08; letter-spacing: 0; color: #102f25; }
    .sub { margin: 0; color: #4c6058; line-height: 1.45; font-weight: 600; }
    .chips { display: flex; gap: 18px; flex-wrap: wrap; }
    .chip { min-width: 150px; padding: 16px 18px; border-radius: 22px; background: rgba(232,243,238,.95); color: #24624e; font-weight: 850; text-align: center; box-shadow: inset 0 0 0 1px rgba(47,125,99,.08); white-space: nowrap; }
    .phone { position: relative; border-radius: 44px; background: #111827; padding: 14px; box-shadow: 0 34px 80px rgba(17,24,39,.2); }
    .phone-inner { width: 100%; height: 100%; border-radius: 34px; background: #f8fbf7; overflow: hidden; position: relative; }
    .notch { position: absolute; left: 50%; top: 16px; transform: translateX(-50%); width: 80px; height: 18px; border-radius: 12px; background: #111827; z-index: 3; }
    .appbar { height: 74px; display: flex; align-items: center; justify-content: center; padding-top: 20px; font-weight: 900; color: #123529; }
    .phone-content { padding: 18px 24px; display: grid; gap: 16px; }
    .card { background: #fff; border: 1px solid #dce7e1; border-radius: 24px; padding: 22px; box-shadow: 0 14px 34px rgba(25,64,50,.08); }
    .score-row { display: flex; align-items: flex-end; justify-content: space-between; gap: 18px; }
    .score { font-size: 52px; line-height: .95; font-weight: 950; color: #123529; white-space: nowrap; }
    .score span { font-size: 22px; color: #7a8981; }
    .bar { height: 12px; border-radius: 999px; background: #e1ece6; overflow: hidden; margin-top: 18px; }
    .bar i { display: block; height: 100%; width: 86%; border-radius: inherit; background: linear-gradient(90deg, #2f7d63, #4c93d8); }
    .mini-title { color: #2f7d63; font-weight: 900; font-size: 18px; margin-bottom: 7px; }
    .mini-body { color: #596a62; font-size: 15px; line-height: 1.35; font-weight: 650; }
    .bars { height: 128px; display: flex; align-items: end; gap: 12px; padding-top: 18px; }
    .bars i { flex: 1; min-width: 14px; border-radius: 999px 999px 6px 6px; background: #75b99d; }
    .report-lines { display: grid; gap: 10px; margin-top: 8px; }
    .report-lines i { height: 12px; border-radius: 999px; background: #e2ece6; }
    .report-lines i:nth-child(1) { width: 92%; } .report-lines i:nth-child(2) { width: 76%; } .report-lines i:nth-child(3) { width: 84%; }
    .pet-row { display: flex; gap: 14px; }
    .pet { flex: 1; border-radius: 22px; background: #eff7f2; padding: 16px; text-align: center; font-weight: 900; color: #245c49; }
    .privacy-lock { width: 74px; height: 74px; border-radius: 28px; display: grid; place-items: center; background: #e6f3ed; color: #2f7d63; font-size: 34px; margin-bottom: 12px; }
    .feature { width: 1024px; height: 500px; padding: 48px 50px; }
    .feature .brand { font-size: 31px; }
    .feature .headline { width: 535px; margin-top: 42px; font-size: 54px; }
    .feature .sub { width: 520px; margin-top: 22px; font-size: 23px; }
    .feature .chips { margin-top: 34px; width: 540px; }
    .feature .phone { position: absolute; right: 54px; top: 34px; width: 292px; height: 430px; }
    .feature .phone .phone-content { padding: 16px 18px; gap: 12px; }
    .feature .phone .card { padding: 16px; border-radius: 20px; }
    .feature .phone .mini-title { font-size: 15px; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .feature .phone .mini-body { font-size: 12px; }
    .feature .phone .score { font-size: 38px; }
    .feature .phone .score span { font-size: 18px; }
    .feature .floating { display: none; }
    .feature .floating .card { padding: 16px 20px; border-radius: 20px; }
    .feature .pet-photo { position: absolute; right: 382px; bottom: 46px; width: 118px; height: 118px; border-radius: 34px; background: linear-gradient(135deg, #f7dfc1, #ffffff); display: grid; place-items: center; font-size: 42px; box-shadow: 0 28px 70px rgba(47,125,99,.16); border: 1px solid #dfe9e3; }
    .shot { width: 1080px; height: 1920px; padding: 58px 72px 78px; }
    .shot .top { display: flex; align-items: center; justify-content: space-between; }
    .shot .brand { font-size: 42px; }
    .version { background: #2f7d63; color: #fff; font-weight: 900; border-radius: 24px; padding: 22px 54px; font-size: 28px; }
    .shot .kicker { margin-top: 88px; font-size: 22px; }
    .shot .headline { margin-top: 34px; font-size: 68px; max-width: 840px; }
    .shot .sub { margin-top: 28px; font-size: 31px; max-width: 820px; }
    .shot .stage { position: absolute; left: 86px; right: 86px; top: 580px; bottom: 250px; border-radius: 46px; background: rgba(255,255,255,.82); border: 2px solid #dce9e2; display: grid; place-items: center; }
    .shot .stage .phone { width: 568px; height: 960px; }
    .shot .bottom-copy { position: absolute; left: 104px; right: 104px; bottom: 84px; min-height: 116px; border-radius: 34px; background: #e6f3ed; display: grid; place-items: center; text-align: center; padding: 22px 46px; color: #245c49; font-size: 29px; font-weight: 900; line-height: 1.35; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const DATA = {
      "ko-KR": {
        lang: "ko", feature: "AI 반려동물 장건강 체크", sub: "사진 분석 · 패턴 추적 · 수의사 리포트", kicker: "프리미엄 AI 케어",
        short: "AI 사진 분석으로 반려동물 장건강 점수와 패턴을 확인하세요",
        titles: ["AI 건강 점수", "사진 한 장으로 분석", "배변 캘린더", "주간 패턴 추적", "수의사 공유 리포트", "멀티펫 프로필", "개인정보 보호", "매일 관리 루틴"],
        subs: ["색상, 형태, 위험 신호를 100점으로 정리", "Bristol Type과 이상 징후를 빠르게 확인", "날짜별 기록으로 반복 신호를 놓치지 않기", "식단, 시간대, 점수 변화를 한눈에", "PDF/CSV로 병원 상담 자료 준비", "강아지와 고양이를 따로 관리", "사진은 보호자 중심으로 안전하게 관리", "알림과 기록으로 꾸준한 케어"]
      },
      "en-US": {
        lang: "en", feature: "AI Pet Gut Health Check", sub: "Photo analysis · Pattern tracking · Vet-ready reports", kicker: "Premium AI care",
        short: "AI photo analysis for pet gut health scores, patterns, and vet-ready reports",
        titles: ["AI Health Score", "Analyze One Photo", "Stool Calendar", "Weekly Pattern Tracking", "Vet-Ready Reports", "Multi-Pet Profiles", "Privacy First", "Daily Care Routine"],
        subs: ["Color, shape, and warning signs summarized as a score", "See Bristol Type and risk signals in seconds", "Track repeated signals by day", "Connect diet, timing, and score changes", "Export PDF/CSV notes for clinic visits", "Manage dogs and cats separately", "Keep sensitive photos under your control", "Use reminders and history for steady care"]
      },
      "ja-JP": {
        lang: "ja", feature: "AIペット腸健康チェック", sub: "写真分析 · パターン追跡 · 獣医共有レポート", kicker: "プレミアムAIケア",
        short: "AI写真分析でペットの腸健康スコア、パターン、獣医向けレポートを確認",
        titles: ["AI健康スコア", "写真1枚で分析", "排便カレンダー", "週間パターン追跡", "獣医共有レポート", "マルチペット", "プライバシー重視", "毎日のケアルーチン"],
        subs: ["色、形、注意サインを100点で整理", "Bristol Typeとリスクをすばやく確認", "日別記録で変化を見逃さない", "食事、時間帯、スコア変化を確認", "PDF/CSVで通院相談に備える", "犬と猫を別々に管理", "大切な写真を安全に扱う", "通知と履歴で継続ケア"]
      }
    };
    const params = new URLSearchParams(location.search);
    const locale = params.get("locale") || "ko-KR";
    const type = params.get("type") || "feature";
    const shot = Number(params.get("shot") || "0");
    const d = DATA[locale] || DATA["en-US"];
    const root = document.getElementById("root");

    function phoneHtml(index) {
      const title = d.titles[index] || d.titles[0];
      const body = d.subs[index] || d.subs[0];
      const panels = [
        `<div class="card"><div class="score-row"><div><div class="mini-title">${title}</div><div class="mini-body">${body}</div></div><div class="score">86<span>/100</span></div></div><div class="bar"><i></i></div></div>`,
        `<div class="card"><div class="mini-title">Bristol Type 4</div><div class="mini-body">Normal color · Stable shape · No urgent risk</div></div>`,
        `<div class="card"><div class="mini-title">Pattern tracking</div><div class="bars"><i style="height:32px"></i><i style="height:50px"></i><i style="height:72px"></i><i style="height:86px"></i><i style="height:98px"></i><i style="height:44px"></i><i style="height:64px"></i></div></div>`,
        `<div class="card"><div class="mini-title">Vet-ready PDF</div><div class="mini-body">Summary, trend, and notes prepared for a clinic visit.</div><div class="report-lines"><i></i><i></i><i></i></div></div>`,
        `<div class="card"><div class="pet-row"><div class="pet">Dog<br>86</div><div class="pet">Cat<br>82</div></div></div>`,
        `<div class="card"><div class="privacy-lock">🔒</div><div class="mini-title">Privacy first</div><div class="mini-body">Sensitive records stay under caregiver control.</div></div>`
      ];
      const order = index === 4 ? [3,0,2] : index === 5 ? [4,0,2] : index === 6 ? [5,0,3] : index === 2 ? [2,0,1] : [0,1,2];
      return `<div class="phone"><div class="notch"></div><div class="phone-inner"><div class="appbar">PoopBuddy</div><div class="phone-content">${order.map(i => panels[i]).join("")}</div></div></div>`;
    }

    if (type === "feature") {
      root.innerHTML = `<section class="board feature">
        <div class="brand"><div class="mark">PB</div><div>PoopBuddy</div></div>
        <h1 class="headline">${d.feature}</h1>
        <p class="sub">${d.sub}</p>
        <div class="chips"><div class="chip">${d.titles[1]}</div><div class="chip">${d.titles[3]}</div><div class="chip">${d.titles[4]}</div></div>
        <div class="pet-photo">🐶🐱</div>
        ${phoneHtml(0)}
        <div class="floating"><div class="card"><div class="mini-title">AI analysis</div><div class="mini-body">Color normal · Shape normal · Risk clear</div></div><div style="height:16px"></div><div class="card"><div class="mini-title">Vet-ready PDF</div><div class="mini-body">Share trends before a clinic visit</div></div></div>
      </section>`;
    } else {
      root.innerHTML = `<section class="board shot">
        <div class="top"><div class="brand"><div class="mark">PB</div><div>PoopBuddy</div></div><div class="version">v2.4</div></div>
        <div class="kicker">${d.kicker}</div>
        <h1 class="headline">${d.titles[shot]}</h1>
        <p class="sub">${d.subs[shot]}</p>
        <div class="stage">${phoneHtml(shot)}</div>
        <div class="bottom-copy">${d.short}</div>
      </section>`;
    }
  </script>
</body>
</html>
